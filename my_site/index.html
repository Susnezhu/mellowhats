<!DOCTYPE html>
<html lang="fi"> <!-- Указываем язык сайта -->
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Katalogi</title>
  <link rel="stylesheet" href="style.css">

    <style>

    /* Отступ для содержимого, чтобы не перекрывалось заголовком */
    .catalog {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
      padding: 100px 20px 20px; /* Отступ сверху из-за фиксированного header */
    }

    .product-card {
      background-color: white;
      border: 1px solid #ddd;
      border-radius: 8px;
      width: 200px;
      padding: 15px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      text-align: center;
      transition: transform 0.2s;
    }

    .product-card:hover {
      transform: scale(1.05);
    }

    .product-card img {
      max-width: 100%;
      border-radius: 8px;
      margin-bottom: 10px;
    }

    .product-card h3 {
      font-size: 18px;
      margin: 10px 0;
    }

    .product-card p {
      color: #555;
      font-size: 14px;
    }

    .product-card button {
      background-color: #007bff;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 5px;
      cursor: pointer;
    }

    .product-card button:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>
  <header>
    <h1>Katalogi</h1> <!-- Финский заголовок -->

    <!-- навигация ...-->
    <div class="navigation">
        <img src="/pictures/navigation.png" alt="navigation menu">
    </div>

    <!-- лого mellowhats-->
    <div class="logo-mellowhats">
        <a href="/index.html" target="_self">
            <img src="/pictures/logo.jpg" alt="logo">
        </a>
    </div>

    <!-- Иконка Instagram -->
    <div class="instagram-icon">
      <a href="https://www.instagram.com/mellowhats/" target="_blank"> <!-- Ссылка на Instagram -->
        <img src="/pictures/instagram_logo.png" alt="Instagram"> <!-- Добавь свою картинку -->
      </a>
    </div>


  <!--иконка facebook-->
  <div class="facebook-icon">
    <a href="https://www.facebook.com/profile.php?id=61571847846252&locale=fi_FI" target="_blank">
        <img src="/pictures/facebook_logo.png" alt="Facebook">
    </a>
  </div>

  <div class="gmail-icon">
    <a href="https://mail.google.com/mail/u/2/#inbox?compose=DmwnWrRqhSNFVtzJGjVfJFKsxdBjbBspVRkxLmblddTpNvRpmDTwppQnXMSzmrGGHSMVThsMVgXG" target="_blank">
        <img src="/pictures/gmail_logo.png" alt="Gmail">
    </a>
  </div>
    </header>

  <div class="catalog">
    <!-- Tuotekortti -->
    <div class="product-card">
      <img src="/pictures/hat_scarf_white.jpg" alt="Tuote 1">
      <h3>Hooded Scarf Hat</h3> <!-- Название товара -->
      <p>43,90€</p> <!-- Описание -->
      <a href="/products/scarft_white.html" target="_self">
        <button>Osta</button> <!-- Кнопка "Купить" -->
      </a>
    </div>

    <div class="product-card">
      <img src="/pictures/hat_scarf_black.jpg" alt="Tuote 2">
      <h3>Hooded Scarf Hat</h3>
      <p>43,90€</p>
      <a href="/products/scarf_black.html" target="_self">
        <button>Osta</button>
      </a>
    </div>

    <div class="product-card">
      <img src="/pictures/hat_straight.jpg" alt="Tuote 3">
      <h3>Square Cat Ear Hat</h3>
      <p>36,90€</p>
      <a href="/products/square_black.html" target="_self">
        <button>Osta</button>
      </a>
    </div>

    <!-- Добавь больше карточек товара -->
  </div>
</body>
</html>
